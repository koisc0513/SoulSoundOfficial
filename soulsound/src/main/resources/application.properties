spring.application.name=soulsound

# ===============================

# Database

# ===============================

spring.datasource.url=jdbc:mysql://localhost:3306/soulsound?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool (Hikari)

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# ===============================

# JPA / Hibernate

# ===============================

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_batch_fetch_size=10
spring.jpa.open-in-view=true

# ===============================

# Thymeleaf

# ===============================

spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML

# ===============================

# File Upload

# ===============================

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
app.upload.dir=uploads

# ===============================

# JWT

# ===============================

jwt.secret=soulsound-super-secret-key-at-least-256-bits-long-for-hs256
jwt.expiration=86400000

# ===============================

# Session

# ===============================

server.servlet.session.persistent=false
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=Strict

# ===============================

# Server

# ===============================

server.port=8081
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# ===============================

# Error Handling

# ===============================

server.error.whitelabel.enabled=false
